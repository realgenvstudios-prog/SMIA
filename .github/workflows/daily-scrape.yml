name: Daily SMIP Scrape & Analysis

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC = 6:00 AM Ghana time (Ghana is UTC+0)
  workflow_dispatch:        # manual trigger from GitHub UI anytime

jobs:
  scrape-and-analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CI: "true"           # triggers today-only date filter + headless mode

    steps:
      # ── 1. Get the code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python packages
        run: pip install patchright supabase python-dotenv anthropic scrapling

      # ── 4. Install headless Chromium ───────────────────────────────────────
      - name: Install Patchright browser
        run: python -m patchright install chromium

      # ── 5. Restore login sessions ──────────────────────────────────────────
      # These are base64-encoded copies of your session JSON files.
      # To encode locally and copy to clipboard:
      #   base64 -i tiktok-scraper/tiktok_session.json | pbcopy
      # Then paste as a GitHub Secret (Settings > Secrets > Actions)
      - name: Restore TikTok session
        run: echo "${{ secrets.TIKTOK_SESSION }}" | base64 -d > tiktok-scraper/tiktok_session.json
        continue-on-error: true

      - name: Restore Instagram session
        run: echo "${{ secrets.INSTAGRAM_SESSION }}" | base64 -d > instagram-scraper/instagram_session.json
        continue-on-error: true

      - name: Restore Facebook session
        run: echo "${{ secrets.FB_SESSION }}" | base64 -d > facebook-scraper/fb_session.json
        continue-on-error: true

      - name: Restore Twitter/X session
        run: echo "${{ secrets.X_SESSION }}" | base64 -d > twitter-scraper/x_session.json
        continue-on-error: true

      # ── 6. Run scrapers (today's posts only, no comments for speed) ────────
      - name: Scrape TikTok
        run: cd tiktok-scraper && python3 run.py --videos-only
        continue-on-error: true

      - name: Scrape Instagram
        run: cd instagram-scraper && python3 run.py --posts-only
        continue-on-error: true

      - name: Scrape Facebook
        run: cd facebook-scraper && python3 run.py --posts-only
        continue-on-error: true

      - name: Scrape YouTube
        run: cd youtube-scraper && python3 run.py --no-comments
        continue-on-error: true

      - name: Scrape Twitter/X
        run: cd twitter-scraper && python3 run.py --replies-only
        continue-on-error: true

      # ── 7. Run AI analysis on today's data ─────────────────────────────────
      - name: Run AI Analysis
        run: python3 analyze.py --brand konnected-minds --days 1
