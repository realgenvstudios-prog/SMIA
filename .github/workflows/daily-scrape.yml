name: Daily SMIP Scrape + Analysis

on:
  schedule:
    # Every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ github.workspace }}/ghana-intel/requirements.txt
        continue-on-error: false

      - name: Scrape Instagram (Apify)
        working-directory: ${{ github.workspace }}/instagram-scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scraper_apify.py
        continue-on-error: true

      - name: Scrape TikTok Videos (Apify)
        working-directory: ${{ github.workspace }}/tiktok-scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scraper_apify.py
        continue-on-error: true

      - name: Scrape TikTok Comments (Apify)
        working-directory: ${{ github.workspace }}/tiktok-scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scraper_apify_comments.py
        continue-on-error: true

      - name: Scrape YouTube
        working-directory: ${{ github.workspace }}/youtube-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 scraper.py
        continue-on-error: true

      - name: Scrape Twitter
        working-directory: ${{ github.workspace }}/twitter-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWITTER_ACCOUNTS: ${{ secrets.TWITTER_ACCOUNTS }}
        run: python3 scraper.py
        continue-on-error: true

      - name: Scrape Facebook (headless)
        working-directory: ${{ github.workspace }}/facebook-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f fb_session.json ]; then
            python3 scraper.py
          else
            echo "Skipping Facebook — no session file (requires manual login via login.py)"
          fi
        continue-on-error: true

      - name: Run AI Analysis Pipeline
        working-directory: ${{ github.workspace }}/ghana-intel
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 processing/analyze.py
        continue-on-error: true

      - name: Done
        if: always()
        run: echo "SMIP daily pipeline complete. Check Supabase for updates."
